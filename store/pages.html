<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arvaan Collective — Premium Curated Marketplace</title>
  <meta name="description" content="Discover premium collections at Arvaan Collective.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/store.css?v=10">
</head>
<body class="dynamic-page">

<!-- ══ ANNOUNCEMENT BAR ══ -->
<div class="announce-bar" id="announce-bar">
  <div class="announce-inner">
    <span class="announce-item active">🚚 Free Delivery on orders above ₹999</span>
    <span class="announce-item">🎁 Use code <strong>WELCOME10</strong> for 10% off your first order</span>
    <span class="announce-item">↩️ 30-Day Easy Returns — Zero Hassle</span>
  </div>
  <button class="announce-close" onclick="this.closest('.announce-bar').style.display='none'">✕</button>
</div>

<!-- ══ NAVBAR ══ -->
<header class="site-header" id="site-header">
  <nav class="navbar" id="navbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">✦</div>
      <span>Arvaan <em>Collective</em></span>
    </a>
    <!-- ══ CATEGORIES DROPDOWN ══ -->
    <div class="dropdown categories-dropdown" id="nav-categories-dropdown">
      <button class="nav-action-btn" id="categories-dropdown-toggle">
        <span>📂</span>
        <span class="nav-btn-label">Categories</span>
      </button>
      <div class="dropdown-menu" id="categories-dropdown-menu">
        <!-- Categories dynamic links injected by store.js -->
      </div>
    </div>


    <div class="navbar-center">
      <div class="search-box-nav" id="nav-search-box-trigger">
        <span class="search-icon-nav">🔍</span>
        <input type="text" id="nav-search-input" placeholder="Search curated realms..." autocomplete="off">
        <div class="search-results-dropdown hidden" id="search-results-dropdown"></div>
      </div>
    </div>

    <div class="navbar-actions">
      <select id="currency-select" class="currency-select">
        <option value="INR">₹ INR</option>
        <option value="USD">$ USD</option>
      </select>

      <div class="dropdown" id="nav-user-menu">
        <button class="nav-action-btn" id="user-dropdown-toggle">
          <div class="avatar avatar-sm" id="nav-avatar-initials">U</div>
          <span class="nav-btn-label" id="nav-user-name-short">Me</span>
        </button>
        <div class="dropdown-menu" id="user-dropdown-menu">
          <div class="user-dropdown-header">
            <div class="user-name" id="nav-user-name">User</div>
            <div class="user-email" id="nav-user-email">user@email.com</div>
          </div>
          <a href="account.html" class="dropdown-item">👤 My Account</a>
          <a href="orders.html" class="dropdown-item">📦 My Orders</a>
          <a href="wishlist.html" class="dropdown-item">❤️ Wishlist</a>
          <div class="dropdown-divider"></div>
          <a href="../seller/seller.html" class="dropdown-item">🏪 Seller Dashboard</a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" id="logout-btn" style="color:var(--clr-danger)">🚪 Sign Out</button>
        </div>
      </div>

      <a href="wishlist.html" class="nav-action-btn" title="Wishlist">
        <span>❤️</span>
        <span class="nav-btn-label">Wishlist</span>
      </a>

      <button class="nav-action-btn cart-nav-btn" id="cart-btn">
        <span>🛒</span>
        <span class="cart-badge hidden" id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <!-- ══ CATEGORY NAV BAR ══ -->
  <div class="cat-navbar" id="cat-navbar">
    <div class="cat-navbar-inner">
      <!-- Dynamic links injected by store.js -->
    </div>
  </div>
</header>

<main class="store-main">
  <!-- Dynamic Route Container -->
  <div class="page-header" style="background-color: var(--clr-surface-alt);">
    <div class="page-container" style="padding: 60px 0; text-align: center;">
       <div class="breadcrumb" style="display:flex; justify-content:center; gap:10px; font-size:0.85rem; color:var(--clr-text-3); margin-bottom: 20px;">
          <a href="index.html">Home</a> <span>/</span> <span id="breadcrumb-page-title">Page</span>
       </div>
       <h1 class="section-heading" style="margin:0;">Loading...</h1>
       <p class="page-last-updated" style="font-size: 0.9rem; color: var(--clr-text-3); margin-top: 15px; opacity: 0.8;"></p>
    </div>
  </div>

  <div class="page-container" style="padding: 60px 0;">
    <div class="policy-content-card" style="box-shadow: 0 10px 40px rgba(0,0,0,0.05); border-radius: 20px; overflow: hidden; background: #fff; border: 1px solid var(--clr-border);">
      <div class="policy-content" id="dynamic-page-content" style="padding: 40px 60px; line-height: 1.8; color: var(--clr-text-2);">
        <div style="text-align:center; padding: 40px;">
           <div class="loader-spinner" style="margin: 0 auto 20px;"></div>
           <p>Loading your content...</p>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ══ FOOTER ══ -->
<div id="global-footer"></div>
<div id="global-modals"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
<script src="../js/data.js?v=20"></script>
  <script src="../js/firebase-sync.js?v=20"></script>
<script src="../js/auth.js"></script>
<script src="../js/store.js?v=20"></script>
</body>
</html>
