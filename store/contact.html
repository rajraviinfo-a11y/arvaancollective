<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Arvaan Collective</title>
  <meta name="description" content="Reach out to the Arvaan Collective team for any inquiries, support, or feedback. We're here to assist you with your premium experience.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/store.css?v=8.1">
</head>
<body class="contact-page">

<!-- ══ ANNOUNCEMENT BAR ══ -->
<div class="announce-bar" id="announce-bar">
  <div class="announce-inner">
    <span class="announce-item active">🚚 Free Delivery on orders above ₹999</span>
    <span class="announce-item">🎁 Use code <strong>WELCOME10</strong> for 10% off your first order</span>
    <span class="announce-item">↩️ 30-Day Easy Returns — Zero Hassle</span>
  </div>
  <button class="announce-close" onclick="this.closest('.announce-bar').style.display='none'">✕</button>
</div>

<!-- ══ NAVBAR ══ -->
<header class="site-header" id="site-header">
  <nav class="navbar" id="navbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">✦</div>
      <span>Arvaan <em>Collective</em></span>
    </a>
    <!-- ══ CATEGORIES DROPDOWN ══ -->
    <div class="dropdown categories-dropdown" id="nav-categories-dropdown">
      <button class="nav-action-btn" id="categories-dropdown-toggle">
        <span>📂</span>
        <span class="nav-btn-label">Categories</span>
      </button>
      <div class="dropdown-menu" id="categories-dropdown-menu">
        <!-- Categories dynamic links injected by store.js -->
      </div>
    </div>


    <div class="navbar-center">
      <div class="search-box-nav" id="nav-search-box-trigger">
        <span class="search-icon-nav">🔍</span>
        <input type="text" id="nav-search-input" placeholder="Search products, brands, categories…" autocomplete="off">
        <div class="search-results-dropdown hidden" id="search-results-dropdown"></div>
      </div>
    </div>

    <div class="navbar-actions">
      <select id="currency-select" class="currency-select">
        <option value="INR">₹ INR</option>
        <option value="USD">$ USD</option>
      </select>

      <button class="nav-action-btn" id="nav-login-btn" title="Sign In">
        <span>👤</span>
        <span class="nav-btn-label">Account</span>
      </button>

      <a href="wishlist.html" class="nav-action-btn" title="Wishlist">
        <span>❤️</span>
        <span class="nav-btn-label">Wishlist</span>
      </a>

      <button class="nav-action-btn cart-nav-btn" id="cart-btn">
        <span>🛒</span>
        <span class="nav-btn-label">Cart</span>
        <span class="cart-badge hidden" id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <!-- ══ CATEGORY NAV BAR ══ -->
  <div class="cat-navbar" id="cat-navbar">
    <div class="cat-navbar-inner">
      <!-- Dynamic links injected by store.js -->
    </div>
  </div>
</header>

<main class="store-main">
  <div class="page-container" style="padding-top:var(--space-10)">
    <div class="section-title-row" style="margin-bottom:var(--space-8); justify-content:center; text-align:center">
      <div>
        <div class="section-eyebrow">Connect with Us</div>
        <h1 class="section-heading">Contact Us</h1>
        <p class="text-muted page-last-updated" style="max-width:600px; margin:16px auto 0">Last Updated: April 2026</p>
      </div>
    </div>
    <div class="policy-content-card" style="margin-top: 40px;">
      <div class="policy-content" id="dynamic-page-content">
        <!-- Dynamic content injected by store.js -->
      </div>
    </div>
  </div>
</main>

<!-- ══ GLOBAL FOOTER & MODALS ══ -->
<div id="global-footer"></div>
<div id="global-modals"></div>

<script src="../js/data.js?v=4"></script>
<script src="../js/auth.js"></script>
<script src="../js/store.js?v=15"></script>
<script>
  document.getElementById('contact-form')?.addEventListener('submit', function(e) {
    e.preventDefault();
    showToast('🎉 Message Sent', 'We have received your inquiry. A concierge will respond within 2-4 hours.', 'success');
    this.reset();
  });
</script>
</body>
</html>
